proxy_app = "tcp://127.0.0.1:26658"

[rpc]
laddr = "tcp://0.0.0.0:26657"

[p2p]
laddr = "tcp://0.0.0.0:26656"
persistent_peers = "9ce1b269a9373d3d2833f08b9bac0d76a816e566@10.99.0.2:26656,b9d9c5e6d09097fdc6af1024d88b2d779bcaf2d5@10.99.0.3:26656"
addr_book_strict = false
allow_duplicate_ip = true

[mempool]
# FIX: Increase Mempool size from 5,000 to 150,000 to handle massive bursts
size = 150000
cache_size = 150000
max_txs_bytes = 536870912
recheck = false

[consensus]
timeout_propose = "300ms"
timeout_propose_delta = "100ms"
timeout_prevote = "200ms"
timeout_prevote_delta = "100ms"
timeout_precommit = "200ms"
timeout_precommit_delta = "100ms"
timeout_commit = "200ms"

skip_timeout_commit = true
peer_gossip_sleep_duration = "10ms"

# FIX: Force an empty block every 1 second to prevent the consensus engine from 
# stalling edge-case transactions in the mempool
create_empty_blocks = false
